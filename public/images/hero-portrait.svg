<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" fill="none">
  <defs>
    <linearGradient id="rim" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#6c47ff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6c47ff" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#6c47ff" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#1e1b2e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="suit" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#0f0f18"/>
      <stop offset="50%" stop-color="#151520"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="tie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="40%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="900" fill="#09090f"/>
  <ellipse cx="320" cy="280" rx="280" ry="340" fill="url(#glow)"/>
  <!-- Rim light silhouette edge -->
  <path
    d="M300 120 C220 120 160 200 160 320 L155 900 L445 900 L440 320 C440 200 380 120 300 120Z"
    fill="url(#suit)"
    stroke="url(#rim)"
    stroke-width="3"
    filter="url(#soft)"
  />
  <!-- Head -->
  <ellipse cx="300" cy="175" rx="72" ry="88" fill="#12121c" stroke="url(#rim)" stroke-width="2"/>
  <!-- Neck -->
  <path d="M268 248 L268 290 L332 290 L332 248 Z" fill="#0d0d14"/>
  <!-- Shirt collar -->
  <path d="M268 285 L300 340 L332 285 L318 275 L300 305 L282 275 Z" fill="#e8e8ef"/>
  <!-- Tie -->
  <path d="M292 278 L308 278 L302 420 L298 420 Z" fill="url(#tie)"/>
  <path d="M285 415 L315 415 L308 520 L292 520 Z" fill="url(#tie)"/>
  <!-- Shoulders / jacket lapels hint -->
  <path d="M160 320 L200 300 L280 340 L300 360 L320 340 L400 300 L440 320 L430 380 L300 420 L170 380 Z" fill="#0c0c14" opacity="0.85"/>
  <!-- Subtle face shadow -->
  <ellipse cx="285" cy="175" rx="35" ry="45" fill="#000" opacity="0.25"/>
</svg>
